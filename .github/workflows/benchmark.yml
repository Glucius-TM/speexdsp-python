name: Benchmark

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libspeexdsp-dev

      - name: Install current package
        run: pip install .

      - name: Run comparative benchmark
        run: python benchmarks/compare_to_original.py --frame-size 256 --iterations 2000
