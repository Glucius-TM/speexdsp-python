name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libspeexdsp-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install speexdsp
          echo "SPEEXDSP_INCLUDE_DIR=$(brew --prefix speexdsp)/include" >> "$GITHUB_ENV"
          echo "SPEEXDSP_LIBRARY_DIR=$(brew --prefix speexdsp)/lib" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install speexdsp:x64-windows
          "SPEEXDSP_INCLUDE_DIR=$env:RUNNER_TEMP\vcpkg\installed\x64-windows\include" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SPEEXDSP_LIBRARY_DIR=$env:RUNNER_TEMP\vcpkg\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$env:RUNNER_TEMP\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pybind11

      - name: Install package
        run: pip install .

      - name: Run tests
        run: pytest -q
